name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.platform }}
    runs-on: macos-26
    strategy:
      # Let each platform leg finish independently: a macOS failure should not
      # cancel the still-running iOS leg (or vice versa), so a red run reports
      # every real failure rather than one plus a cascade of cancellations.
      fail-fast: false
      matrix:
        platform: [iOS, macOS]
        include:
          - platform: iOS
            destination: "platform=iOS Simulator,name=iPhone 17 Pro,OS=latest"
          - platform: macOS
            destination: "platform=macOS"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Key the cache to the resolved Xcode build so a `latest-stable` bump can
      # never restore DerivedData whose SwiftSyntax macro binaries were compiled
      # against the previous toolchain (they fail with "unable to resolve Swift
      # module dependency to a compatible module"). Runs after Setup Xcode so the
      # version is known before the cache is restored.
      - name: Capture Xcode version
        run: echo "XCODE_BUILD=$(xcodebuild -version | tail -n1 | awk '{print $NF}')" >> "$GITHUB_ENV"

      # Restore on every run, but only save on main. A cache written on a PR ref
      # is readable solely by that PR, while one written on main is readable by
      # every branch — so PR saves cost ~31s per matrix leg and ~1GB of quota to
      # populate an entry almost nothing reads. Measured over a fortnight of
      # runs, no run ever restored a refs/pull/* entry; PRs were served by
      # main's cache, and each merge then re-saved the same key anyway.
      - name: Restore Xcode cache
        id: cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ matrix.platform }}-xcode-${{ env.XCODE_BUILD }}-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-xcode-${{ env.XCODE_BUILD }}-

      - name: Install brew
        run: brew bundle

      - name: Verify Macros
        run: defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      - name: Build and Test
        run: |
          set -o pipefail && xcodebuild test \
          -scheme BrzzUtils-Package \
          -destination '${{ matrix.destination }}' \
          -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
          -resultBundlePath TestResults-${{ matrix.platform }} \
          | xcbeautify

      # On failure, keep the result bundle so a snapshot mismatch's full
      # message (image sizes, perceptual diff) and the newly-taken image are
      # inspectable — xcbeautify collapses them to "recorded an issue" in the log.
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ matrix.platform }}
          path: TestResults-${{ matrix.platform }}.xcresult
          retention-days: 7

      # Must run after the build, and only when the exact key was missed —
      # actions/cache/save has no restore step to skip itself.
      - name: Save Xcode cache
        if: github.ref == 'refs/heads/main' && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ matrix.platform }}-xcode-${{ env.XCODE_BUILD }}-${{ hashFiles('Package.swift') }}
